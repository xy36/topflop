<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; gap: 40px; padding: 40px; align-items: flex-start; flex-wrap: wrap; }
  canvas { border-radius: 22.5%; display: block; }
  .label { color: white; font-family: sans-serif; text-align: center; margin-top: 8px; font-size: 12px; }
</style>
</head>
<body>
<div>
  <canvas id="icon" width="1024" height="1024" style="width:300px;height:300px;"></canvas>
  <div class="label">App Icon (1024×1024)</div>
</div>
<div>
  <canvas id="splash" width="512" height="512" style="width:200px;height:200px;"></canvas>
  <div class="label">Splash Icon (512×512)</div>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const s = size;
  const cx = s / 2;
  const cy = s / 2;

  // --- Background gradient ---
  const bg = ctx.createLinearGradient(0, 0, s * 0.4, s);
  bg.addColorStop(0, '#1a6b3c');
  bg.addColorStop(0.5, '#22a855');
  bg.addColorStop(1, '#15803d');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  // subtle radial glow
  const glow = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy * 0.7, s * 0.55);
  glow.addColorStop(0, 'rgba(255,255,255,0.12)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();

  // --- Plate / circle base ---
  const plateR = s * 0.32;
  const plateCY = cy + s * 0.04;

  // plate shadow
  ctx.beginPath();
  ctx.arc(cx, plateCY + s * 0.015, plateR + s * 0.01, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fill();

  // plate white
  ctx.beginPath();
  ctx.arc(cx, plateCY, plateR + s * 0.022, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.fill();

  // plate inner circle
  ctx.beginPath();
  ctx.arc(cx, plateCY, plateR, 0, Math.PI * 2);
  ctx.fillStyle = '#f8f8f6';
  ctx.fill();

  // inner ring
  ctx.beginPath();
  ctx.arc(cx, plateCY, plateR - s * 0.025, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,0,0,0.06)';
  ctx.lineWidth = s * 0.008;
  ctx.stroke();

  // --- Food items on the plate ---

  // Salad / green mound
  function drawSalad() {
    const leafColor = '#4ade80';
    const darkLeaf = '#16a34a';

    // main green mound
    ctx.beginPath();
    ctx.ellipse(cx - s * 0.04, plateCY + s * 0.04, s * 0.12, s * 0.08, 0, 0, Math.PI * 2);
    ctx.fillStyle = leafColor;
    ctx.fill();

    // leaf 1
    ctx.beginPath();
    ctx.ellipse(cx - s * 0.13, plateCY - s * 0.01, s * 0.07, s * 0.04, -0.5, 0, Math.PI * 2);
    ctx.fillStyle = darkLeaf;
    ctx.fill();

    // leaf 2
    ctx.beginPath();
    ctx.ellipse(cx + s * 0.06, plateCY - s * 0.02, s * 0.08, s * 0.04, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = leafColor;
    ctx.fill();

    // leaf 3 top
    ctx.beginPath();
    ctx.ellipse(cx - s * 0.03, plateCY - s * 0.07, s * 0.06, s * 0.035, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#86efac';
    ctx.fill();
  }

  // Tomato
  function drawTomato() {
    const tx = cx + s * 0.11;
    const ty = plateCY + s * 0.05;
    const tr = s * 0.065;

    // tomato body
    const tg = ctx.createRadialGradient(tx - tr * 0.3, ty - tr * 0.3, 0, tx, ty, tr);
    tg.addColorStop(0, '#fca5a5');
    tg.addColorStop(1, '#dc2626');
    ctx.beginPath();
    ctx.arc(tx, ty, tr, 0, Math.PI * 2);
    ctx.fillStyle = tg;
    ctx.fill();

    // highlight
    ctx.beginPath();
    ctx.arc(tx - tr * 0.28, ty - tr * 0.28, tr * 0.28, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    // stem
    ctx.beginPath();
    ctx.moveTo(tx, ty - tr);
    ctx.quadraticCurveTo(tx + tr * 0.2, ty - tr * 1.4, tx + tr * 0.1, ty - tr * 1.6);
    ctx.strokeStyle = '#15803d';
    ctx.lineWidth = s * 0.012;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  drawSalad();
  drawTomato();

  // --- Fork (left of plate) ---
  function drawFork() {
    const fx = cx - plateR - s * 0.04;
    const fy = plateCY;
    const fh = s * 0.42;
    const fw = s * 0.008;

    ctx.save();
    ctx.translate(fx, fy);

    // handle
    ctx.beginPath();
    ctx.roundRect(-fw * 1.5, -fh * 0.15, fw * 3, fh * 0.62, fw);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();

    // neck connector
    ctx.beginPath();
    ctx.roundRect(-fw, -fh * 0.16, fw * 2, -fh * 0.08, fw * 0.5);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();

    // tines base
    const tineTop = -fh * 0.48;
    const tineBottom = -fh * 0.18;
    const tineSpacing = s * 0.018;

    for (let i = -1; i <= 1; i++) {
      // tine
      ctx.beginPath();
      ctx.roundRect(i * tineSpacing - fw * 0.7, tineTop, fw * 1.4, tineBottom - tineTop + fw * 2, fw * 0.7);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fill();
    }
    // extra outer tines
    for (let i of [-2, 2]) {
      ctx.beginPath();
      ctx.roundRect(i * tineSpacing - fw * 0.7, tineTop + fh * 0.04, fw * 1.4, (tineBottom - tineTop) * 0.85, fw * 0.7);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fill();
    }

    ctx.restore();
  }

  // --- Knife (right of plate) ---
  function drawKnife() {
    const kx = cx + plateR + s * 0.04;
    const ky = plateCY;
    const kh = s * 0.42;
    const kw = s * 0.008;

    ctx.save();
    ctx.translate(kx, ky);

    // handle
    ctx.beginPath();
    ctx.roundRect(-kw * 1.5, -kh * 0.15, kw * 3, kh * 0.62, kw);
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();

    // blade
    ctx.beginPath();
    ctx.moveTo(-kw * 1.8, -kh * 0.18);
    ctx.lineTo(kw * 0.8, -kh * 0.18);
    ctx.lineTo(kw * 1.8, -kh * 0.44);
    ctx.lineTo(-kw * 0.5, -kh * 0.48);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.fill();

    ctx.restore();
  }

  drawFork();
  drawKnife();

  // --- "J" monogram / heart detail ---
  // small heart above plate
  function drawHeart() {
    const hx = cx;
    const hy = cy - s * 0.34;
    const hr = s * 0.055;

    ctx.save();
    ctx.translate(hx, hy);
    ctx.scale(1, 0.9);

    ctx.beginPath();
    ctx.moveTo(0, hr * 0.5);
    ctx.bezierCurveTo(-hr * 0.1, 0, -hr * 1.1, -hr * 0.2, -hr * 1.0, -hr * 0.8);
    ctx.bezierCurveTo(-hr * 0.9, -hr * 1.3, 0, -hr * 1.0, 0, -hr * 0.4);
    ctx.bezierCurveTo(0, -hr * 1.0, hr * 0.9, -hr * 1.3, hr * 1.0, -hr * 0.8);
    ctx.bezierCurveTo(hr * 1.1, -hr * 0.2, hr * 0.1, 0, 0, hr * 0.5);
    ctx.closePath();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.fill();

    ctx.restore();
  }

  drawHeart();

  // --- App name text (only for larger sizes) ---
  if (size >= 512) {
    ctx.font = `bold ${s * 0.068}px -apple-system, 'Helvetica Neue', sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText("Janine's", cx, cy + s * 0.38);
  }
}

drawIcon(document.getElementById('icon'), 1024);
drawIcon(document.getElementById('splash'), 512);
</script>
</body>
</html>
